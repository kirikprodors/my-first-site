<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KIRIKGRAM</title>
    <style>
        body { 
            background-color: #181818; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* ОКНА АВТОРИЗАЦИИ / РЕГИСТРАЦИИ */
        .auth-card {
            background: #212121;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 320px;
            text-align: center;
            display: none;
        }
        .auth-card h2 { color: #5288c1; margin-top: 0; }
        .auth-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #181818;
            border: 1px solid #2f2f2f;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 10px;
            background: #5288c1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .auth-btn:hover { background: #659bd6; }
        .auth-link {
            color: #5288c1;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        .error-msg { color: #ff5555; font-size: 14px; margin-top: 5px; min-height: 18px; }
        .back-arrow { text-align: left; cursor: pointer; color: #5288c1; font-size: 18px; margin-bottom: 10px; }

        /* ИНТЕРФЕЙС ЧАТА */
        #telegram-container { 
            display: none; 
            width: 800px; 
            height: 600px; 
            background: #212121; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        #side-panel { 
            width: 250px; 
            background: #1e1e1e; 
            border-right: 1px solid #2f2f2f; 
            display: flex; 
            flex-direction: column;
        }

        #brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #2f2f2f;
        }
        #brand-title { font-size: 20px; font-weight: bold; color: #5288c1; }
        #logout-btn { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 14px; }

        /* БЛОК ПОИСКА ДРУЗЕЙ */
        #search-area {
            padding: 10px;
            border-bottom: 1px solid #2f2f2f;
            display: flex;
            gap: 5px;
        }
        #search-input {
            flex: 1;
            padding: 6px 10px;
            background: #181818;
            border: 1px solid #2f2f2f;
            border-radius: 5px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        #search-btn {
            background: #5288c1;
            border: none;
            color: white;
            border-radius: 5px;
            padding: 0 10px;
            cursor: pointer;
            font-size: 13px;
        }

        #chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item { 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #252525;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #2c2c2c; }
        .chat-item.active { background: #2b5278; }

        /* ПРАВАЯ ПАНЕЛЬ */
        #main-chat { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #17212b; 
        }

        #chat-header { 
            padding: 15px 20px; 
            background: #212121; 
            font-weight: bold; 
            border-bottom: 1px solid #2f2f2f;
            display: none; /* Прячем заголовок чата, пока никого не выбрали */
        }

        #messages-area { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            gap: 10px;
            justify-content: center; /* По центру для начального текста */
            align-items: center;
        }

        /* Текст-заглушка */
        #no-history-text {
            color: #7f8c8d;
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
        }

        .message { 
            max-width: 70%; 
            padding: 10px 14px; 
            border-radius: 10px; 
            font-size: 15px; 
            word-wrap: break-word;
            align-self: flex-start;
        }
        .msg-outbound { background: #2b5278; align-self: flex-end; }

        #input-panel { 
            padding: 15px; 
            background: #212121; 
            display: none; /* Скрыто, пока не выбран чат */
            gap: 10px; 
        }

        #message-input { 
            flex: 1; 
            padding: 12px; 
            background: #181818; 
            border: 1px solid #2f2f2f; 
            border-radius: 8px; 
            color: white; 
            outline: none;
        }

        #send-btn { 
            padding: 0 20px; 
            background: #5288c1; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        /* МОДАЛКА ВЫХОДА */
        #confirm-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: #212121;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            width: 260px;
        }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 15px; }
        .modal-btn { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-yes { background: #ff5555; color: white; }
        .btn-no { background: #5288c1; color: white; }
    </style>
</head>
<body>

<div id="register-screen" class="auth-card" style="display: block;">
    <h2>Welcome to KIRIKGRAM</h2>
    <input type="text" id="reg-name" placeholder="Имя">
    <input type="password" id="reg-pass" placeholder="Пароль">
    <input type="password" id="reg-confirm" placeholder="Подтвердите пароль">
    <div id="reg-error" class="error-msg"></div>
    <button class="auth-btn" onclick="handleRegister()">Зарегистрироваться</button>
    <div class="auth-link" onclick="showScreen('login-screen')">Already registered? Log in to KIRIKGRAM.</div>
</div>

<div id="login-screen" class="auth-card">
    <div class="back-arrow" onclick="showScreen('register-screen')">← Назад</div>
    <h2>Log in to KIRIKGRAM</h2>
    <input type="text" id="login-name" placeholder="Имя">
    <input type="password" id="login-pass" placeholder="Пароль">
    <div id="login-error" class="error-msg"></div>
    <button class="auth-btn" onclick="handleLogin()">Войти</button>
</div>

<div id="telegram-container">
    <div id="side-panel">
        <div id="brand-header">
            <div id="brand-title">KIRIKGRAM</div>
            <button id="logout-btn" onclick="openLogoutModal()">Выйти</button>
        </div>
        
        <div id="search-area">
            <input type="text" id="search-input" placeholder="Найти друга...">
            <button id="search-btn" onclick="findUser()">Найти</button>
        </div>
        
        <div id="chats-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">Чат: </div>
        
        <div id="messages-area">
            <div id="no-history-text">
                You don't have a chat history, please find your chat partners in the search.
            </div>
        </div>
        
        <div id="input-panel">
            <input type="text" id="message-input" placeholder="Написать сообщение...">
            <button id="send-btn" onclick="processSend()">Отправить</button>
        </div>
    </div>
</div>

<div id="confirm-modal">
    <div class="modal-content">
        <p style="margin-top:0;">You really want to leave?</p>
        <div class="modal-btns">
            <button class="modal-btn btn-yes" onclick="logout()">Yes</button>
            <button class="modal-btn btn-no" onclick="closeLogoutModal()">No</button>
        </div>
    </div>
</div>

<script>
    let currentUser = "";
    let currentChat = "";
    let activeChats = []; // Список чатов, которые сейчас отображаются слева

    function showScreen(screenId) {
        document.getElementById("register-screen").style.display = "none";
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("telegram-container").style.display = "none";
        
        document.getElementById(screenId).style.display = screenId === 'telegram-container' ? 'flex' : 'block';
        
        document.getElementById("reg-error").innerText = "";
        document.getElementById("login-error").innerText = "";
    }

    // Регистрация
    function handleRegister() {
        let name = document.getElementById("reg-name").value.trim();
        let pass = document.getElementById("reg-pass").value;
        let confirm = document.getElementById("reg-confirm").value;
        let errorDiv = document.getElementById("reg-error");

        if (!name || !pass || !confirm) {
            errorDiv.innerText = "Заполните все поля!";
            return;
        }
        if (pass !== confirm) {
            errorDiv.innerText = "Пароли не совпадают!";
            return;
        }

        localStorage.setItem("user_" + name, pass);
        currentUser = name;
        
        resetChatSystem();
        showScreen('telegram-container');
    }

    // Вход
    function handleLogin() {
        let name = document.getElementById("login-name").value.trim();
        let pass = document.getElementById("login-pass").value;
        let errorDiv = document.getElementById("login-error");

        let savedPassword = localStorage.getItem("user_" + name);

        if (!savedPassword || savedPassword !== pass) {
            errorDiv.innerText = "Incorrect password!";
            return;
        }

        currentUser = name;
        resetChatSystem();
        showScreen('telegram-container');
    }

    // Сброс окон при перезаходе
    function resetChatSystem() {
        currentChat = "";
        activeChats = [];
        document.getElementById("chats-list").innerHTML = "";
        document.getElementById("messages-area").innerHTML = '<div id="no-history-text">You don't have a chat history, please find your chat partners in the search.</div>';
        document.getElementById("messages-area").style.justifyContent = "center";
        document.getElementById("chat-header").style.display = "none";
        document.getElementById("input-panel").style.display = "none";
        document.getElementById("search-input").value = "";
    }

    // ПОИСК ПОЛЬЗОВАТЕЛЕЙ
    function findUser() {
        let searchName = document.getElementById("search-input").value.trim();
        if (searchName === "") return;

        // Проверяем, зарегистрирован ли вообще такой человек в localStorage
        let userExists = localStorage.getItem("user_" + searchName);

        if (!userExists) {
            alert("Пользователь " + searchName + " не найден в KIRIKGRAM!");
            return;
        }

        if (searchName === currentUser) {
            alert("Вы не можете искать самого себя!");
            return;
        }

        // Если такой чат уже добавлен слева, просто переключаемся на него
        if (activeChats.includes(searchName)) {
            switchChat(searchName);
            return;
        }

        // Добавляем в массив активных чатов и рендерим в колонку
        activeChats.push(searchName);
        let chatsList = document.getElementById("chats-list");
        
        let newChatItem = document.createElement("div");
        newChatItem.className = "chat-item";
        newChatItem.innerText = searchName;
        newChatItem.onclick = function() { switchChat(searchName); };
        
        chatsList.appendChild(newChatItem);
        
        // Сразу открываем этот чат
        switchChat(searchName);
    }

    // Переключение чатов
    function switchChat(chatName) {
        currentChat = chatName;
        
        // Показываем заголовок чата и поле ввода
        document.getElementById("chat-header").style.display = "block";
        document.getElementById("chat-header").innerText = "Чат: " + chatName;
        document.getElementById("input-panel").style.display = "flex";
        
        // Перестраиваем область сообщений (убираем заглушку, включаем режим чата)
        let area = document.getElementById("messages-area");
        area.innerHTML = ""; 
        area.style.justifyContent = "flex-end"; // Сообщения прижимаются к низу

        // Подсвечиваем выбранный чат в списке слева
        let items = document.getElementsByClassName("chat-item");
        for (let item of items) {
            item.classList.remove("active");
            if (item.innerText === chatName) {
                item.classList.add("active");
            }
        }
    }

    // Отправка сообщений
    function processSend() {
        let inputField = document.getElementById("message-input");
        let area = document.getElementById("messages-area");

        if (inputField.value.trim() !== "") {
            let msgDiv = document.createElement("div");
            msgDiv.className = "message msg-outbound";
            msgDiv.innerText = currentUser + ": " + inputField.value;
            
            area.appendChild(msgDiv);
            inputField.value = "";
            area.scrollTop = area.scrollHeight;
        }
    }

    // Модалка выхода
    function openLogoutModal() { document.getElementById("confirm-modal").style.display = "flex"; }
    function closeLogoutModal() { document.getElementById("confirm-modal").style.display = "none"; }
    
    function logout() {
        currentUser = "";
        closeLogoutModal();
        document.getElementById("reg-name").value = "";
        document.getElementById("reg-pass").value = "";
        document.getElementById("reg-confirm").value = "";
        document.getElementById("login-name").value = "";
        document.getElementById("login-pass").value = "";
        showScreen('register-screen');
    }

    document.getElementById("message-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") { processSend(); }
    });
</script>

</body>
</html>
