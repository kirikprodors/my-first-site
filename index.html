<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KIRIKGRAM</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; justify-content: center; }
        #chat-window { width: 400px; height: 500px; background: #2b2b2b; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        #input-area { display: flex; padding: 10px; background: #333; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; }
        button { padding: 10px; margin-left: 5px; background: #0088cc; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .msg { background: #444; padding: 8px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Напиши сообщение...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function sendMessage() {
        let input = document.getElementById("msgInput");
        let msgBox = document.getElementById("messages");
        if (input.value !== "") {
            let newMsg = document.createElement("div");
            newMsg.className = "msg";
            newMsg.innerText = "Кирилл: " + input.value;
            msgBox.appendChild(newMsg);
            input.value = "";
            msgBox.scrollTop = msgBox.scrollHeight;
        }
    }
</script>

</body>
</html>
