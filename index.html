<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KIRIKGRAM</title>
    <style>
        body { 
            background-color: #181818; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* ОКНА АВТОРИЗАЦИИ / РЕГИСТРАЦИИ */
        .auth-card {
            background: #212121;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 320px;
            text-align: center;
            display: none;
        }
        .auth-card h2 { color: #5288c1; margin-top: 0; }
        .auth-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #181818;
            border: 1px solid #2f2f2f;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 10px;
            background: #5288c1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .auth-btn:hover { background: #659bd6; }
        .auth-link {
            color: #5288c1;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        .error-msg { color: #ff5555; font-size: 14px; margin-top: 5px; min-height: 18px; }
        .back-arrow { text-align: left; cursor: pointer; color: #5288c1; font-size: 18px; margin-bottom: 10px; }

        /* ИНТЕРФЕЙС ЧАТА */
        #telegram-container { 
            display: none; 
            width: 800px; 
            height: 600px; 
            background: #212121; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }

        #side-panel { 
            width: 280px; 
            background: #1e1e1e; 
            border-right: 1px solid #2f2f2f; 
            display: flex; 
            flex-direction: column;
        }

        #brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #2f2f2f;
        }
        #brand-title { font-size: 20px; font-weight: bold; color: #5288c1; }
        #logout-btn { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 14px; }

        #search-box {
            padding: 10px 15px;
            border-bottom: 1px solid #2f2f2f;
            display: flex;
            gap: 5px;
        }
        #search-input {
            flex: 1;
            padding: 6px 10px;
            background: #181818;
            border: 1px solid #2f2f2f;
            border-radius: 5px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        #search-btn {
            background: #5288c1;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            padding: 0 10px;
        }

        #chat-list { flex: 1; overflow-y: auto; }
        .no-chats-msg {
            padding: 20px;
            color: #aaaaaa;
            font-size: 14px;
            text-align: center;
            line-height: 1.4;
        }

        .chat-item { 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #252525;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #2c2c2c; }
        .chat-item.active { background: #2b5278; }

        #main-chat { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #17212b; 
        }

        #chat-header { 
            padding: 15px 20px; 
            background: #212121; 
            font-weight: bold; 
            border-bottom: 1px solid #2f2f2f;
        }

        #messages-area { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column;
            gap: 10px;
        }

        .chat-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #777;
        }

        .message { 
            max-width: 70%; 
            padding: 10px 14px; 
            border-radius: 10px; 
            font-size: 15px; 
            word-wrap: break-word;
        }
        .msg-inbound { background: #182533; align-self: flex-start; }
        .msg-outbound { background: #2b5278; align-self: flex-end; }

        #input-panel { 
            padding: 15px; 
            background: #212121; 
            display: flex; 
            gap: 10px; 
        }

        #message-input { 
            flex: 1; 
            padding: 12px; 
            background: #181818; 
            border: 1px solid #2f2f2f; 
            border-radius: 8px; 
            color: white; 
            outline: none;
        }

        #send-btn { 
            padding: 0 20px; 
            background: #5288c1; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        #confirm-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal-content {
            background: #212121;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            width: 260px;
        }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 15px; }
        .modal-btn { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-yes { background: #ff5555; color: white; }
        .btn-no { background: #5288c1; color: white; }
    </style>
</head>
<body>

<div id="register-screen" class="auth-card" style="display: block;">
    <h2>Welcome to KIRIKGRAM</h2>
    <input type="text" id="reg-name" placeholder="Имя">
    <input type="password" id="reg-pass" placeholder="Пароль">
    <input type="password" id="reg-confirm" placeholder="Подтвердите пароль">
    <div id="reg-error" class="error-msg"></div>
    <button class="auth-btn" id="reg-btn">Зарегистрироваться</button>
    <div class="auth-link" id="to-login-link">Already registered? Log in to KIRIKGRAM.</div>
</div>

<div id="login-screen" class="auth-card">
    <div class="back-arrow" id="back-to-reg">← Назад</div>
    <h2>Log in to KIRIKGRAM</h2>
    <input type="text" id="login-name" placeholder="Имя">
    <input type="password" id="login-pass" placeholder="Пароль">
    <div id="login-error" class="error-msg"></div>
    <button class="auth-btn" id="login-btn">Войти</button>
</div>

<div id="telegram-container">
    <div id="side-panel">
        <div id="brand-header">
            <div id="brand-title">KIRIKGRAM</div>
            <button id="logout-btn">Выйти</button>
        </div>
        
        <div id="search-box">
            <input type="text" id="search-input" placeholder="Найти друга по имени...">
            <button id="search-btn">Найти</button>
        </div>
        <div id="search-error" class="error-msg" style="text-align:center; font-size:12px; padding: 0 10px;"></div>

        <div id="chat-list">
            <div class="no-chats-msg" id="empty-notice">
                You don't have a chat history, please find your chat partners in the search.
            </div>
        </div>
    </div>

    <div id="main-chat">
        <div id="chat-view-placeholder" class="chat-placeholder">
            Выберите, с кем хотите начать переписку
        </div>
        
        <div id="chat-view-active" style="display: none; flex-direction: column; flex: 1;">
            <div id="chat-header">Чат: ...</div>
            <div id="messages-area"></div>
            <div id="input-panel">
                <input type="text" id="message-input" placeholder="Написать сообщение...">
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>
</div>

<div id="confirm-modal">
    <div class="modal-content">
        <p style="margin-top:0;">You really want to leave?</p>
        <div class="modal-btns">
            <button class="modal-btn btn-yes" id="confirm-logout-yes">Yes</button>
            <button class="modal-btn btn-no" id="confirm-logout-no">No</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    // Твой личный скопированный паспорт Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyB86-UBtg14ECIK7rpUcYf3dwK4rBCcDiw",
        authDomain: "kirikgram.firebaseapp.com",
        projectId: "kirikgram",
        storageBucket: "kirikgram.firebasestorage.app",
        messagingSenderId: "393237310761",
        appId: "1:393237310761:web:cea334b035cf056b20db38",
        measurementId: "G-J9YZ24CLJR"
    };

    // Старт работы с базой
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = "";
    let currentChat = "";
    let activeChats = [];
    let currentRoomRef = null;

    // Переключение экранов
    function showScreen(screenId) {
        document.getElementById("register-screen").style.display = "none";
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("telegram-container").style.display = "none";
        
        document.getElementById(screenId).style.display = screenId === 'telegram-container' ? 'flex' : 'block';
    }

    // Регистрация в облаке
    function handleRegister() {
        let name = document.getElementById("reg-name").value.trim();
        let pass = document.getElementById("reg-pass").value;
        let confirm = document.getElementById("reg-confirm").value;
        let errorDiv = document.getElementById("reg-error");

        if (!name || !pass || !confirm) { errorDiv.innerText = "Заполните все поля!"; return; }
        if (pass !== confirm) { errorDiv.innerText = "Пароли не совпадают!"; return; }

        const userRef = ref(db, 'users/' + name);
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                errorDiv.innerText = "Это имя уже занято!";
            } else {
                set(ref(db, 'users/' + name), { password: pass }).then(() => {
                    currentUser = name;
                    resetChatSystem();
                    showScreen('telegram-container');
                });
            }
        });
    }

    // Вход через облако
    function handleLogin() {
        let name = document.getElementById("login-name").value.trim();
        let pass = document.getElementById("login-pass").value;
        let errorDiv = document.getElementById("login-error");

        get(ref(db, 'users/' + name)).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().password === pass) {
                currentUser = name;
                resetChatSystem();
                showScreen('telegram-container');
            } else {
                errorDiv.innerText = "Incorrect password!";
            }
        });
    }

    function resetChatSystem() {
        activeChats = [];
        currentChat = "";
        document.getElementById("chat-list").innerHTML = `
            <div class="no-chats-msg" id="empty-notice">
                You don't have a chat history, please find your chat partners in the search.
            </div>`;
        document.getElementById("chat-view-placeholder").style.display = "flex";
        document.getElementById("chat-view-active").style.display = "none";
    }

    // Поиск по глобальной базе
    function handleSearch() {
        let searchInput = document.getElementById("search-input");
        let searchName = searchInput.value.trim();
        let errorDiv = document.getElementById("search-error");
        errorDiv.innerText = "";

        if (searchName === "" || searchName.toLowerCase() === currentUser.toLowerCase()) { return; }

        get(ref(db, 'users/' + searchName)).then((snapshot) => {
            if (snapshot.exists()) {
                addChatToList(searchName);
                switchChat(searchName);
                searchInput.value = "";
            } else {
                errorDiv.innerText = "Пользователь не найден!";
            }
        });
    }

    function addChatToList(chatName) {
        if (!activeChats.includes(chatName)) {
            activeChats.push(chatName);
            let notice = document.getElementById("empty-notice");
            if (notice) notice.remove();
            
            let list = document.getElementById("chat-list");
            let chatItem = document.createElement("div");
            chatItem.className = "chat-item";
            chatItem.id = "chat-item-" + chatName;
            chatItem.innerText = chatName;
            chatItem.onclick = function() { switchChat(chatName); };
            list.appendChild(chatItem);
        }
    }

    // Подключение к комнате общения
    function switchChat(chatName) {
        if (currentRoomRef) { off(currentRoomRef); } // Снимаем старую слежку за сообщениями
        
        currentChat = chatName;
        document.getElementById("chat-view-placeholder").style.display = "none";
        document.getElementById("chat-view-active").style.display = "flex";
        document.getElementById("chat-header").innerText = "Чат: " + chatName;
        
        let items = document.getElementsByClassName("chat-item");
        for (let item of items) { item.classList.remove("active"); }
        let activeItem = document.getElementById("chat-item-" + chatName);
        if (activeItem) activeItem.classList.add("active");
        
        document.getElementById("messages-area").innerHTML = "";

        let roomId = currentUser < currentChat ? currentUser + "_" + currentChat : currentChat + "_" + currentUser;
        currentRoomRef = ref(db, 'messages/' + roomId);

        // Включаем LIVE-прослушку новых сообщений из интернета
        onChildAdded(currentRoomRef, (snapshot) => {
            let data = snapshot.val();
            displayMessage(data.sender, data.text);
        });
    }

    function displayMessage(sender, text) {
        let area = document.getElementById("messages-area");
        let msgDiv = document.createElement("div");
        msgDiv.className = sender === currentUser ? "message msg-outbound" : "message msg-inbound";
        msgDiv.innerText = sender + ": " + text;
        area.appendChild(msgDiv);
        area.scrollTop = area.scrollHeight;
    }

    // Закидываем сообщение в интернет-облако
    function processSend() {
        let inputField = document.getElementById("message-input");
        let text = inputField.value.trim();

        if (text !== "" && currentChat !== "") {
            let roomId = currentUser < currentChat ? currentUser + "_" + currentChat : currentChat + "_" + currentUser;
            const messagesRef = ref(db, 'messages/' + roomId);
            push(messagesRef, {
                sender: currentUser,
                text: text
            });
            inputField.value = "";
        }
    }

    function logout() {
        if (currentRoomRef) { off(currentRoomRef); }
        currentUser = "";
        document.getElementById("confirm-modal").style.display = "none";
        showScreen('register-screen');
    }

    // Привязка кликов к кнопкам (из-за правил модулей скрипта)
    document.getElementById("reg-btn").onclick = handleRegister;
    document.getElementById("login-btn").onclick = handleLogin;
    document.getElementById("search-btn").onclick = handleSearch;
    document.getElementById("send-btn").onclick = processSend;
    document.getElementById("logout-btn").onclick = () => document.getElementById("confirm-modal").style.display = "flex";
    document.getElementById("confirm-logout-yes").onclick = logout;
    document.getElementById("confirm-logout-no").onclick = () => document.getElementById("confirm-modal").style.display = "none";
    document.getElementById("to-login-link").onclick = () => showScreen('login-screen');
    document.getElementById("back-to-reg").onclick = () => showScreen('register-screen');

    document.getElementById("message-input").addEventListener("keypress", (e) => { if (e.key === "Enter") processSend(); });
    document.getElementById("search-input").addEventListener("keypress", (e) => { if (e.key === "Enter") handleSearch(); });
</script>

</body>
</html>
